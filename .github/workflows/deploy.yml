name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write environment file
        run: |
          cat > .env << EOF
          NODE_ENV=${{ secrets.NODE_ENV }}
          HTTP_PORT=${{ secrets.HTTP_PORT }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          docker compose down
          docker compose up -d --build